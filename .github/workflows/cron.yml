# ============================================================
# Echo AI — GitHub Actions: 每日自动采集与处理
# 触发时间: UTC 00:00 (北京时间 08:00)
# 数据源: Hacker News / Reddit / RSS / GitHub Trending (全免费)
# AI: DeepSeek (摘要/打分) + Jina AI (Embedding)
# ============================================================

name: Daily Echo Pipeline

on:
  schedule:
    # 每天 UTC 00:00 运行 (北京时间 08:00)
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持手动触发

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  JINA_API_KEY: ${{ secrets.JINA_API_KEY }}

jobs:
  fetch-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch data from all sources
        run: npx tsx scripts/fetch-posts.ts

      - name: Run AI processing pipeline
        run: npx tsx scripts/run-pipeline.ts

      - name: Report results
        if: always()
        run: |
          echo "::notice::Echo daily pipeline completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
